# Nginx 설정: 프론트 정적 파일 + /api 백엔드 프록시
# 사용법:
#   sudo cp deploy/nginx-maydin.conf /etc/nginx/sites-available/maydin
#   sudo ln -sf /etc/nginx/sites-available/maydin /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# ⚠️ 이미 HTTPS(Certbot) 쓰고 있었다면: 이 파일로 덮어쓰면 443 설정이 사라질 수 있음.
#    복구: sudo certbot --nginx -d maydin.co.kr -d www.maydin.co.kr (SSL 블록 다시 추가)
#    또는 기존 설정 백업 후 location /api/ 부분만 이 파일에서 복사해 넣기.
# ⚠️ 413 이미지 업로드: 443 블록에도 client_max_body_size 20M; 넣고 reload.
# 도메인·HTTPS: docs/DOMAIN_SETUP.md 참고

server {
    listen 80;
    server_name maydin.co.kr www.maydin.co.kr;
    # 도메인 없이 IP만 쓸 때: server_name _;

    # 이미지 업로드 413 방지 (HTTPS 443 블록에도 동일하게 넣을 것)
    client_max_body_size 20M;

    root /var/www/maydin;
    index index.html;

    # 프론트 정적 파일 (HTML, CSS, JS, 이미지)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=60";
    }

    # API → Node.js (PM2)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 업로드 이미지 (Node에서 서빙)
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    # assets 등 정적 리소스
    location /assets/ {
        add_header Cache-Control "public, max-age=86400";
    }
}
