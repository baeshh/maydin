# EC2 자동 배포 (main 푸시 시)
# 필수 Secrets: EC2_HOST, SSH_PRIVATE_KEY
# 선택 Secrets: ODCLOUD_SERVICE_KEY (사업자 정보 인증용, 없으면 해당 기능만 비활성화)
# 서버 구조: 프로젝트 /home/ubuntu/apps/maydin, Nginx 프론트 /var/www/maydin, API 3001

name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "::error::EC2_HOST secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::error::SSH_PRIVATE_KEY secret is not set. Add your .pem key content."
            exit 1
          fi
          echo "Secrets OK (EC2_HOST and SSH_PRIVATE_KEY are set)"
      - name: Prepare SSH key
        run: |
          # PEM 키를 파일로 저장. Secrets에 \n으로 넣었으면 실제 줄바꿈으로 복원
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | sed 's/\\n/\n/g' > key.pem
          # 앞뒤 빈 줄 제거 (첫 줄 검사 실패 방지)
          sed -i '/./,$!d' key.pem
          grep -q "BEGIN.*PRIVATE KEY" key.pem || grep -q "PRIVATE KEY" key.pem || (echo "::error::SSH key invalid. Add full .pem in Secrets (from -----BEGIN... to -----END...)." && exit 1)
          # 644: ssh-action이 Docker 컨테이너 내 다른 사용자로 실행돼 600이면 permission denied 발생
          chmod 644 key.pem
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          ODCLOUD_SERVICE_KEY: ${{ secrets.ODCLOUD_SERVICE_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key_path: key.pem
          envs: ODCLOUD_SERVICE_KEY
          script_stop: true
          script: |
            set -e
            cd /home/ubuntu/apps/maydin
            git fetch origin main
            git reset --hard origin/main
            # 프론트 → Nginx 서빙 경로 동기화
            sudo rsync -av --delete \
              --exclude='.git' \
              --exclude='server' \
              --exclude='deploy' \
              --exclude='node_modules' \
              --exclude='*.db' \
              ./ /var/www/maydin/
            # 백엔드 (DB 초기화: 테이블·테스트 계정 TEST001 없으면 생성)
            cd /home/ubuntu/apps/maydin/server
            npm ci --omit=dev
            npm run init-db
            # OD Cloud 사업자 인증키: GitHub Secret → 서버 .env (Secret 설정 시에만)
            if [ -n "$ODCLOUD_SERVICE_KEY" ]; then
              touch .env
              sed -i '/^ODCLOUD_SERVICE_KEY=/d' .env 2>/dev/null || true
              echo "ODCLOUD_SERVICE_KEY=$ODCLOUD_SERVICE_KEY" >> .env
            fi
            pm2 restart maydin-api || (pm2 start src/index.js --name maydin-api && pm2 save)
            sleep 2
            curl -sf http://127.0.0.1:3001/api/health || (echo "::error::API health check failed. Check: pm2 list, pm2 logs maydin-api" && exit 1)
