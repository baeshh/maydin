# Nginx 설정: 프론트 정적 파일 + /api 백엔드 프록시
# 사용법:
#   sudo cp deploy/nginx-maydin.conf /etc/nginx/sites-available/maydin
#   sudo ln -sf /etc/nginx/sites-available/maydin /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# 도메인·HTTPS: docs/DOMAIN_SETUP.md 참고

server {
    listen 80;
    server_name maydin.co.kr www.maydin.co.kr;
    # 도메인 없이 IP만 쓸 때: server_name _;

    root /home/ubuntu/apps/maydin;
    index index.html;

    # 프론트 정적 파일 (HTML, CSS, JS, 이미지)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=60";
    }

    # API → Node.js (PM2)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # assets 등 정적 리소스
    location /assets/ {
        add_header Cache-Control "public, max-age=86400";
    }
}
