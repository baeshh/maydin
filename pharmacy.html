<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>약사 전용몰 - MAYDIN</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root {
            --primary-color: #1A4D2E;
            --secondary-color: #E8F3EC;
            --accent-color: #FF5C00;
            --text-dark: #212529;
            --text-gray: #868E96;
            --bg-light: #F8F9FA;
            --white: #FFFFFF;
            --border-color: #E9ECEF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
            color: var(--text-dark);
            background-color: var(--bg-light);
            line-height: 1.5;
        }
        a { text-decoration: none; color: inherit; }
        li { list-style: none; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 헤더 */
        header {
            background-color: var(--white);
            border-bottom: 1px solid var(--border-color);
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }
        .logo {
            display: flex;
            align-items: center;
        }
        .logo img {
            height: 72px;
            width: auto;
            display: block;
        }
        .search-bar {
            display: flex;
            width: 380px;
            max-width: 90%;
            border: 2px solid var(--primary-color);
            border-radius: 8px;
            overflow: hidden;
        }
        .search-bar input {
            flex: 1;
            padding: 10px 15px;
            border: none;
            outline: none;
            font-size: 14px;
        }
        .search-bar button {
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            padding: 0 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
        }
        .header-auth {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-auth a.back-home {
            font-size: 14px;
            color: var(--text-gray);
        }
        .header-auth a.back-home:hover {
            color: var(--primary-color);
        }
        .user-badge {
            font-weight: 700;
            color: var(--primary-color);
            font-size: 14px;
        }
        .btn-mypage {
            padding: 8px 16px;
            background: var(--primary-color);
            color: var(--white);
            border-radius: 50px;
            font-weight: 600;
            font-size: 13px;
            font-family: inherit;
        }
        .btn-mypage:hover {
            opacity: 0.9;
            color: var(--white);
        }
        .btn-logout {
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 13px;
            border: 1px solid var(--border-color);
            background: transparent;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-logout:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        .btn-login {
            padding: 8px 18px;
            background: var(--primary-color);
            color: var(--white);
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
        }

        .gnb {
            display: flex;
            gap: 30px;
            padding: 15px 0;
            font-weight: 600;
            font-size: 15px;
        }
        .gnb a {
            cursor: pointer;
        }
        .gnb a:hover,
        .gnb a.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 4px;
        }

        /* 히어로 배너 */
        .hero-banner {
            background-color: var(--secondary-color);
            border-radius: 20px;
            margin: 40px auto;
            padding: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .hero-content h2 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--text-dark);
        }
        .hero-content p {
            font-size: 18px;
            color: var(--primary-color);
            font-weight: 700;
            margin-bottom: 20px;
        }
        .discount-badge {
            display: inline-block;
            background-color: var(--accent-color);
            color: var(--white);
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
        }
        .hero-image {
            width: 260px;
            height: 180px;
            background-color: var(--white);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-gray);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            font-size: 14px;
        }

        /* 상품 섹션 */
        .product-section {
            margin: 60px 0;
        }
        .section-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 5px;
        }
        .section-desc {
            color: var(--text-gray);
            margin-bottom: 24px;
            font-size: 14px;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }
        .product-card {
            background-color: var(--white);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.08);
        }
        .product-img {
            height: 160px;
            background-color: #F1F3F5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-gray);
            font-size: 13px;
        }
        .product-info {
            padding: 16px;
        }
        .product-name {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .product-price {
            font-size: 18px;
            font-weight: 800;
            color: var(--primary-color);
        }
        .product-price span {
            font-size: 13px;
            color: var(--text-gray);
            font-weight: normal;
        }
        .tag {
            display: inline-block;
            margin-top: 10px;
            font-size: 11px;
            padding: 3px 8px;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            border-radius: 4px;
        }
        .product-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .product-actions button {
            flex: 1;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            border: none;
        }
        .btn-cart {
            background: var(--secondary-color);
            color: var(--primary-color);
        }
        .btn-order {
            background: var(--primary-color);
            color: var(--white);
        }

        @media (max-width: 1024px) {
            .product-grid { grid-template-columns: repeat(3, 1fr); }
        }

        /* 모바일 반응형 */
        @media (max-width: 768px) {
            html, body { overflow-x: hidden; max-width: 100%; }
            .container { padding: 0 16px; }
            .header-top {
                flex-wrap: wrap;
                gap: 12px;
                padding: 12px 0;
            }
            .header-top .logo { flex-shrink: 0; }
            .logo img { height: 48px; }
            .search-bar {
                width: 100%;
                order: 3;
                max-width: 100%;
            }
            .header-auth {
                flex-wrap: wrap;
                gap: 8px;
                justify-content: flex-end;
            }
            .header-auth .back-home { font-size: 12px; }
            .user-badge { font-size: 12px; }
            .btn-mypage { padding: 6px 12px; font-size: 12px; }
            .btn-logout { padding: 5px 10px; font-size: 12px; }
            .btn-login { padding: 6px 14px; font-size: 12px; }
            .gnb-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .gnb {
                flex-wrap: nowrap;
                gap: 20px;
                padding: 12px 0;
                font-size: 14px;
                min-width: max-content;
            }
            .hero-banner {
                flex-direction: column;
                text-align: center;
                padding: 30px 20px;
                margin: 24px auto;
            }
            .hero-content h2 { font-size: 24px; }
            .hero-content p { font-size: 16px; margin-bottom: 12px; }
            .hero-image {
                width: 100%;
                max-width: 200px;
                height: 140px;
                font-size: 12px;
            }
            .product-section { margin: 40px 0; }
            .section-title { font-size: 20px; }
            .section-desc { font-size: 13px; }
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .product-img { height: 120px; font-size: 11px; }
            .product-info { padding: 12px; }
            .product-name { font-size: 13px; }
            .product-price { font-size: 15px; }
            .product-actions button { padding: 6px 8px; font-size: 11px; }
        }

        @media (max-width: 480px) {
            .header-auth .back-home { display: none; }
            .user-badge { max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
            .gnb { font-size: 12px; gap: 10px; }
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container header-top">
            <a href="index.html" class="logo">
                <img src="assets/meidin-logo.png" alt="MAYDIN">
            </a>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="성분이나 제품명을 검색해보세요">
                <button type="button" onclick="searchProducts()">검색</button>
            </div>
            <div class="header-auth">
                <a href="index.html" class="back-home">메이딘 홈</a>
                <span id="userArea">
                    <!-- 로그인 상태에 따라 동적 표시 -->
                </span>
            </div>
        </div>
        <div class="container gnb-wrap">
            <ul class="gnb">
                <li><a href="#" class="gnb-link active" data-filter="home">약사몰홈</a></li>
                <li><a href="#" class="gnb-link" data-filter="best">베스트</a></li>
                <li><a href="#" class="gnb-link" data-filter="new">신규제품</a></li>
                <li><a href="#" class="gnb-link" data-filter="ingredient">성분별</a></li>
                <li><a href="#" class="gnb-link" data-filter="all">전체제품</a></li>
            </ul>
        </div>
    </header>

    <main class="container">
        <section class="hero-banner" onclick="goToDetail(1)" style="cursor: pointer;">
            <div class="hero-content">
                <h2>센시비 (SENSIBI)</h2>
                <p>월 89,000원</p>
                <div class="discount-badge">BEST</div>
            </div>
            <div class="hero-image">
                [상품 렌더링 이미지]
            </div>
        </section>

        <section class="product-section" id="product-section">
            <h3 class="section-title">전 성분 최저가로 구매하세요</h3>
            <p class="section-desc">품질과 함량은 절대 타협하지 않습니다.</p>
            
            <div class="product-grid" id="productGrid">
                <!-- 제품 카드 동적 생성 -->
            </div>
        </section>
    </main>

    <script>
        const products = [
            { id: 1, name: '센시비 (SENSIBI)', price: 89000, unit: '/ 30일', tag: '면역 밸런스', desc: '민감한 현대인을 위한', isBest: true, isNew: false, category: '면역' },
            { id: 2, name: '프리미엄 프로바이오틱스', price: 129000, unit: '/ 30일', tag: '장 건강', desc: '고농도 유산균', isBest: false, isNew: true, category: '장' },
            { id: 3, name: '오메가-3 프리미엄', price: 149000, unit: '/ 30일', tag: '순수 어유', desc: '고농도 오메가-3', isBest: false, isNew: false, category: '오메가3' },
            { id: 4, name: '비타민 D3+K2', price: 69000, unit: '/ 30일', tag: '칼슘 흡수', desc: '뼈 건강', isBest: false, isNew: false, category: '비타민' },
            { id: 5, name: 'rTG 오메가-3 600mg', price: 6900, unit: '/ 30일', tag: '단일 복용 1위', desc: '', isBest: true, isNew: true, category: '오메가3' }
        ];

        let cart = [];
        let currentUser = null;
        let currentFilter = 'home';

        function init() {
            currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
            renderUserArea();
            applyFilter(currentFilter);
            initGnb();
        }

        function initGnb() {
            document.querySelectorAll('.gnb-link').forEach(function(link) {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    var filter = this.getAttribute('data-filter');
                    if (filter) {
                        setActiveNav(this);
                        applyFilter(filter);
                        document.getElementById('product-section').scrollIntoView({ behavior: 'smooth' });
                    }
                });
            });
        }

        function setActiveNav(activeEl) {
            document.querySelectorAll('.gnb-link').forEach(function(a) {
                a.classList.remove('active');
            });
            if (activeEl) activeEl.classList.add('active');
        }

        function applyFilter(filter) {
            currentFilter = filter;
            var list;
            if (filter === 'home' || filter === 'all') {
                list = products;
            } else if (filter === 'best') {
                list = products.filter(function(p) { return p.isBest; });
            } else if (filter === 'new') {
                list = products.filter(function(p) { return p.isNew; });
            } else if (filter === 'ingredient') {
                list = products;
            } else {
                list = products;
            }
            renderProducts(list);
        }

        function renderUserArea() {
            const el = document.getElementById('userArea');
            if (currentUser) {
                el.innerHTML = `
                    <span class="user-badge">${currentUser.name} 약사님</span>
                    <a href="mypage.html" class="btn-mypage">내 정보</a>
                    <button class="btn-logout" onclick="handleLogout()">로그아웃</button>
                `;
            } else {
                el.innerHTML = `<a href="index.html" class="btn-login">로그인</a>`;
            }
        }

        function handleLogout() {
            localStorage.removeItem('currentUser');
            currentUser = null;
            cart = [];
            renderUserArea();
            alert('로그아웃 되었습니다.');
        }

        function renderProducts(list) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = list.map(p => `
                <article class="product-card" onclick="goToDetail(${p.id})">
                    <div class="product-img">[${p.name} 이미지]</div>
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${p.price.toLocaleString()}원 <span>${p.unit}</span></div>
                        <div class="tag">${p.tag}</div>
                        <div class="product-actions" onclick="event.stopPropagation()">
                            <button class="btn-cart" onclick="addToCart(${p.id})">장바구니</button>
                            <button class="btn-order" onclick="quickOrder(${p.id})">주문하기</button>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        function goToDetail(productId) {
            window.location.href = 'product-detail.html?id=' + productId;
        }

        function addToCart(productId) {
            if (!currentUser) {
                if (confirm('로그인이 필요합니다. 메인 페이지에서 로그인할까요?')) {
                    window.location.href = 'index.html';
                }
                return;
            }
            const p = products.find(x => x.id === productId);
            if (p) {
                cart.push(p);
                alert(`${p.name}이(가) 장바구니에 추가되었습니다.`);
            }
        }

        function quickOrder(productId) {
            if (!currentUser) {
                if (confirm('로그인이 필요합니다. 메인 페이지에서 로그인할까요?')) {
                    window.location.href = 'index.html';
                }
                return;
            }
            alert('주문 기능은 준비 중입니다.');
        }

        function searchProducts() {
            const q = document.getElementById('searchInput').value.trim().toLowerCase();
            const filtered = q ? products.filter(p => 
                p.name.toLowerCase().includes(q) || (p.tag && p.tag.toLowerCase().includes(q))
            ) : products;
            renderProducts(filtered);
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchProducts();
        });

        init();
    </script>

</body>
</html>
