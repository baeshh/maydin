# EC2 자동 배포 (main 푸시 시)
# 필수 Secrets: EC2_HOST, SSH_PRIVATE_KEY
# 서버 구조: 프로젝트 /home/ubuntu/apps/maydin, Nginx 프론트 /var/www/maydin, API 3001

name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "::error::EC2_HOST secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::error::SSH_PRIVATE_KEY secret is not set. Add your .pem key content."
            exit 1
          fi
          echo "Secrets OK (EC2_HOST and SSH_PRIVATE_KEY are set)"
      - name: Prepare SSH key
        run: |
          # PEM 키를 파일로 저장 (줄바꿈 유지). Secrets에 붙여넣을 때 줄바꿈이 빠졌다면
          # 'Replace newlines' 옵션으로 저장했을 수 있음 → 실제 줄바꿈으로 복원
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | sed 's/\\n/\n/g' > key.pem
          chmod 600 key.pem
          # 키 형식 검사 (실패 시 Secrets에 PEM 전체를 줄바꿈 포함해 다시 넣으세요)
          head -1 key.pem | grep -q "BEGIN.*PRIVATE KEY" || (echo "::error::SSH key format invalid. Paste full .pem including -----BEGIN.../-----END... with real newlines." && exit 1)
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key_path: key.pem
          script: |
            set -e
            cd /home/ubuntu/apps/maydin
            git fetch origin main
            git reset --hard origin/main
            # 프론트 → Nginx 서빙 경로 동기화
            sudo rsync -av --delete \
              --exclude='.git' \
              --exclude='server' \
              --exclude='deploy' \
              --exclude='node_modules' \
              --exclude='*.db' \
              ./ /var/www/maydin/
            # 백엔드
            cd server
            npm ci --omit=dev
            pm2 restart maydin-api
