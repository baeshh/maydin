        }

        @media (max-width: 480px) {
            .header-auth .back-home { display: none; }

        /* 모바일 전용 래퍼·헤더 (디자인 시안) */

            .mobile-header {
                position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center;

            .mobile-header .cart-count { position: absolute; top: -4px; right: -4px; background: var(--accent-color); color: var(--white); font-size: 10px; min-width: 16px; height: 16px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
            .pharmacy-mobile-main { padding: 0 0 24px; }
            .pharmacy-mobile-main .hero-banner { margin: 16px; padding: 24px 20px; border-radius: 16px; }
            .pharmacy-mobile-main .hero-content h2 { font-size: 20px; }

            .pharmacy-mobile-main .product-grid { grid-template-columns: 1fr; gap: 16px; }
            .pharmacy-mobile-main .product-card { border-radius: 12px; overflow: hidden; }
            .pharmacy-mobile-main .product-img { height: auto; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; color: var(--text-gray); font-size: 12px; background: #F1F3F5; }

            .pharmacy-mobile-main .product-actions { margin-top: 10px; }
            .pharmacy-mobile-main .product-actions button { padding: 10px 12px; font-size: 13px; }
        }
        @media (min-width: 769px) {

<body>

                <li><a href="#" class="gnb-link" data-filter="best">베스트</a></li>
                <li><a href="#" class="gnb-link" data-filter="new">신규제품</a></li>

    <main class="container pharmacy-mobile-main">
        <section class="hero-banner" onclick="goToDetail(1)" style="cursor: pointer;">
            <div class="hero-content">
                <h2>센시비 (SENSIBI)</h2>

            <div class="hero-image">
                [상품 렌더링 이미지]
            </div>
        </section>

        <section class="product-section" id="product-section">
            <h3 class="section-title">전 성분 최저가로 구매하세요</h3>
            <p class="section-desc">품질과 함량은 절대 타협하지 않습니다.</p>
            
            <div class="product-grid" id="productGrid">
                <!-- 제품 카드 동적 생성 -->
            </div>
        </section>
    </main>

    <script>
        let products = [
            { id: 1, name: '센시비 (SENSIBI)', price: 89000, unit: '/ 30일', tag: '면역 밸런스', desc: '민감한 현대인을 위한', isBest: true, isNew: false, category: '면역' },
            { id: 2, name: '프리미엄 프로바이오틱스', price: 129000, unit: '/ 30일', tag: '장 건강', desc: '고농도 유산균', isBest: false, isNew: true, category: '장' },
            { id: 3, name: '오메가-3 프리미엄', price: 149000, unit: '/ 30일', tag: '순수 어유', desc: '고농도 오메가-3', isBest: false, isNew: false, category: '오메가3' },
            { id: 4, name: '비타민 D3+K2', price: 69000, unit: '/ 30일', tag: '칼슘 흡수', desc: '뼈 건강', isBest: false, isNew: false, category: '비타민' },
            { id: 5, name: 'rTG 오메가-3 600mg', price: 6900, unit: '/ 30일', tag: '단일 복용 1위', desc: '', isBest: true, isNew: true, category: '오메가3' }
        ];

        let cart = [];
        let currentUser = null;
        let currentFilter = 'home';

        async function init() {
            currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
            var token = localStorage.getItem('token');
            if (currentUser && !token) {
                currentUser = null;
                localStorage.removeItem('currentUser');
            }
            try {
                var res = await fetch((window.API_BASE || '') + '/api/products');
                var data = await res.json();
                if (data.success && data.products && data.products.length) {
                    products = data.products.map(function(p) {
                        return { id: p.id, name: p.name, price: p.price, unit: p.unit || '/ 30일', tag: p.tag || '', desc: p.desc || '', isBest: !!p.isBest, isNew: !!p.isNew, category: p.category || '', images: p.images || [], imageUrl: p.imageUrl || null };
                    });
                }
            } catch (e) { console.warn('API 연결 실패, 기본 상품 사용:', e); }
            if (currentUser && token) {
                try {
                    var cartRes = await fetch((window.API_BASE || '') + '/api/cart', { headers: { 'Authorization': 'Bearer ' + token } });
                    var cartText = await cartRes.text();
                    var cartData = null;
                    try { cartData = cartText ? JSON.parse(cartText) : null; } catch (_) { }
                    if (cartData && cartData.success && cartData.items && cartData.items.length) {
                        cart = cartData.items.map(function(i) {
                            return {
                                id: i.id,
                                productId: i.productId,
                                name: i.productName,
                                optionLabel: i.optionLabel,
                                price: i.price,
                                qty: i.qty
                            };
                        });
                    }
                    if (!cartData && !cartRes.ok) console.warn('장바구니 로드 실패', cartRes.status, cartText && cartText.slice(0, 150));
                } catch (e) { console.warn('장바구니 로드 오류', e); }
            }
            renderUserArea();
            applyFilter(currentFilter);
            initGnb();
        }

        function initGnb() {
            document.querySelectorAll('.gnb-link').forEach(function(link) {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    var filter = this.getAttribute('data-filter');
                    if (filter) {
                        setActiveNav(this);
                        applyFilter(filter);
                        document.getElementById('product-section').scrollIntoView({ behavior: 'smooth' });
                    }
                });
            });
        }

        function setActiveNav(activeEl) {
            document.querySelectorAll('.gnb-link').forEach(function(a) {
                a.classList.remove('active');
            });
            if (activeEl) activeEl.classList.add('active');
        }

        function applyFilter(filter) {
            currentFilter = filter;
            var list;
            if (filter === 'home' || filter === 'all') {
                list = products;
            } else if (filter === 'best') {
                list = products.filter(function(p) { return p.isBest; });
            } else if (filter === 'new') {
                list = products.filter(function(p) { return p.isNew; });
            } else if (filter === 'ingredient') {
                list = products;
            } else {
                list = products;
            }
            renderProducts(list);
        }

        function renderUserArea() {
            const el = document.getElementById('userArea');
            if (currentUser) {
                el.innerHTML = `
                    <span class="user-badge">${currentUser.name} 약사님</span>
                    <a href="checkout.html" class="btn-cart" style="padding:8px 14px;">장바구니 ${cart.length ? '(' + cart.length + ')' : ''}</a>
                    <a href="mypage.html" class="btn-mypage">내 정보</a>
                    <button class="btn-logout" onclick="handleLogout()">로그아웃</button>
                `;
                var mc = document.getElementById('mobileCartCount');
                if (mc) { mc.textContent = cart.length; mc.style.display = cart.length ? 'flex' : 'none'; }
            } else {
                el.innerHTML = `<a href="index.html" class="btn-login">로그인</a>`;
                var mc = document.getElementById('mobileCartCount');
                if (mc) mc.style.display = 'none';
            }
        }

        function handleLogout() {
            localStorage.removeItem('currentUser');
            localStorage.removeItem('token');
            currentUser = null;
            cart = [];
            renderUserArea();
            alert('로그아웃 되었습니다.');
        }

        function toImageUrl(url) {
            if (!url) return '';
            let u = String(url).trim();
            if (/^https?:\/\//i.test(u)) return u;
            if (u.indexOf('/uploads/') === 0) u = '/api' + u;
            const base = (window.API_BASE || '').replace(/\/$/, '');
            return base + (u.indexOf('/') === 0 ? u : '/' + u);
        }

        function renderProducts(list) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = list.map(p => {
                const imgSrc = (p.images && p.images[0]) ? toImageUrl(p.images[0]) : toImageUrl(p.imageUrl);
                const imgHtml = imgSrc ? '<img src="' + imgSrc + '" alt="' + (p.name || '') + '" style="width:100%;height:100%;object-fit:cover;">' : '<span style="color:var(--text-gray);font-size:12px;">[' + (p.name || '') + ' 이미지]</span>';
                return '<article class="product-card" onclick="goToDetail(' + p.id + ')"><div class="product-img">' + imgHtml + '</div><div class="product-info"><div class="product-name">' + (p.name || '') + '</div><div class="product-price">' + (p.price || 0).toLocaleString() + '원 <span>' + (p.unit || '') + '</span></div><div class="tag">' + (p.tag || '') + '</div><div class="product-actions" onclick="event.stopPropagation()"><button type="button" class="btn-cart" onclick="event.stopPropagation(); addToCart(' + p.id + ')">장바구니</button><button type="button" class="btn-order" onclick="event.stopPropagation(); quickOrder(' + p.id + ')">주문하기</button></div></div></article>';
            }).join('');
        }

        function goToDetail(productId) {
            window.location.href = 'product-detail.html?id=' + productId;
        }

        function addToCart(productId) {
            if (!currentUser) {
                if (confirm('로그인이 필요합니다. 메인 페이지에서 로그인할까요?')) window.location.href = 'index.html';
                return;
            }
            var p = products.find(function(x) { return x.id === productId; });
            if (!p) return;
            var token = localStorage.getItem('token');
            if (token) {
                var url = (window.API_BASE || '') + '/api/cart';
                fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ productId: p.id, productName: p.name, optionLabel: p.unit || '', price: p.price, qty: 1, imageUrl: (p.images && p.images[0]) || p.imageUrl || null })
                }).then(function(r) {
                    return r.text().then(function(text) {
                        var d; try { d = text ? JSON.parse(text) : null; } catch(e) { d = null; }
                        if (!d && !r.ok) console.error('장바구니 API 오류', r.status, url, text && text.slice(0, 200));
                        return { ok: r.ok, data: d, status: r.status };
                    });
                }).then(function(x) {
                    if (x.ok && x.data && x.data.success) {
                        cart = (x.data.items || []).map(function(i) {
                            return {
                                id: i.id,
                                productId: i.productId,
                                name: i.productName,
                                optionLabel: i.optionLabel,
                                price: i.price,
                                qty: i.qty
                            };
                        });
                        renderUserArea();
                        alert(p.name + '이(가) 장바구니에 추가되었습니다.');
                    } else alert((x.data && x.data.message) || '실패');
                }).catch(function(e) {
                    console.error('장바구니 연결 실패', e && e.message, 'URL:', url, e);
                    alert('서버에 일시적으로 연결할 수 없습니다. 잠시 후 다시 시도해 주세요. (F12 → Network에서 실패한 요청 확인)');
                });
            } else {
                alert('로그인이 필요합니다.');
                window.location.href = 'index.html';
            }
        }

        function quickOrder(productId) {
            if (!currentUser) {
                if (confirm('로그인이 필요합니다. 메인 페이지에서 로그인할까요?')) {
                    window.location.href = 'index.html';
                }
                return;
            }
            var p = products.find(function(x) { return x.id === productId; });
            if (!p) return;
            var token = localStorage.getItem('token');
            if (!token) { alert('로그인이 필요합니다.'); return; }
            var url = (window.API_BASE || '') + '/api/cart';
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ productId: p.id, productName: p.name, optionLabel: p.unit || '', price: p.price, qty: 1, imageUrl: (p.images && p.images[0]) || p.imageUrl || null })
            }).then(function(r) {
                return r.text().then(function(text) {
                    var d; try { d = text ? JSON.parse(text) : null; } catch(e) { d = null; }
                    if (!d && !r.ok) console.error('장바구니 API 오류', r.status, url, text && text.slice(0, 200));
                    return { ok: r.ok, data: d, status: r.status };
                });
            }).then(function(x) {
                if (x.ok && x.data && x.data.success) window.location.href = 'checkout.html';
                else alert((x.data && x.data.message) || '장바구니 추가 실패');
            }).catch(function(e) {
                console.error('장바구니/주문 연결 실패', e && e.message, 'URL:', url, e);
                alert('서버에 일시적으로 연결할 수 없습니다. 잠시 후 다시 시도해 주세요. (F12 → Network에서 실패한 요청 확인)');
            });
        }

        function searchProducts() {
            const q = document.getElementById('searchInput').value.trim().toLowerCase();
            const filtered = q ? products.filter(p => 
                p.name.toLowerCase().includes(q) || (p.tag && p.tag.toLowerCase().includes(q))
            ) : products;
            renderProducts(filtered);
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchProducts();
        });

        init();
    </script>

    </div><!-- .mobile-wrap -->

</body>
</html>
